name: Deploy BookTalk to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject API keys
        env:
          KAKAO_KEY: ${{ secrets.KAKAO_API_KEY }}
          GROQ_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          cat > inject.js << 'EOF'
          const fs = require('fs');
          const kakao = (process.env.KAKAO_KEY || '').trim();
          const groq  = (process.env.GROQ_KEY  || '').trim();
          let html = fs.readFileSync('index.html', 'utf8');
          html = html.replace("'__KAKAO_API_KEY__'", "'" + kakao + "'");
          html = html.replace("'__GROQ_API_KEY__'",  "'" + groq  + "'");
          fs.writeFileSync('index.html', html, 'utf8');
          const remaining = (html.match(/__KAKAO_API_KEY__|__GROQ_API_KEY__/g) || []);
          if (remaining.length) console.error('WARNING: 교체 안 된 플레이스홀더:', remaining);
          else console.log('✓ 키 주입 완료');
          EOF
          node inject.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
